# ============================================================
# Job Radar — Search Configuration
# ============================================================
# Edit this file to customize what jobs are scraped.
# Keywords are used by ALL scrapers. Add/remove as needed.
# The pipeline runs ~7x/day (every 3.5h) — duplicates are automatically skipped.

search_keywords:
  # === Data Engineering ===
  - "data engineer"
  - "analytics engineer"
  - "data engineering"
  - "data platform engineer"
  - "ETL engineer"
  - "dbt engineer"
  - "Microsoft Fabric"

  # === Machine Learning ===
  - "ML engineer"
  - "machine learning engineer"
  - "MLOps engineer"

  # === AI / LLM ===
  - "AI engineer"
  - "AI trainer"
  - "AI annotator"
  - "prompt engineer"
  - "LLM engineer"
  - "generative AI"
  - "AI developer"
  - "NLP engineer"

  # === Supply Chain & Commerce ===
  - "supply chain"
  - "logistics"
  - "purchasing"
  - "sales"

  # === Procurement & Sourcing ===
  - "sourcing"
  - "strategic sourcing"
  - "procurement"
  - "SRM"
  - "vendor management"
  - "RFQ"
  - "RFP"

  # === Planning & Forecasting ===
  - "demand planning"
  - "supply planning"
  - "production scheduling"
  - "MRP"
  - "S&OP"
  - "inventory optimization"
  - "safety stock"

  # === Logistics & Transportation ===
  - "WMS"
  - "TMS"
  - "inbound logistics"
  - "outbound logistics"
  - "last-mile delivery"
  - "freight forwarding"
  - "customs clearance"

  # === Supply Chain Analytics ===
  - "SCM analytics"
  - "supply chain analytics"
  - "E2E visibility"
  - "lead time optimization"
  - "cost-to-serve"

  # === Vietnamese keywords ===
  - "tìm kiếm nguồn hàng"
  - "thu mua"
  - "quản lý nhà cung cấp"
  - "lập kế hoạch nhu cầu"
  - "lập kế hoạch cung ứng"
  - "điều độ sản xuất"
  - "tối ưu tồn kho"
  - "điều phối logistics"
  - "quản lý kho"
  - "thông quan"
  - "phân tích chuỗi cung ứng"

# Filter out jobs with these words in title (case-insensitive)
title_exclude:
  - "intern"
  - "student"

# Only include jobs from these locations (empty = all locations)
locations_include: []
# Example: ["Ho Chi Minh", "Hanoi", "Remote", "Vietnam"]

# Minimum salary filter (USD/month equivalent, 0 = no filter)
min_salary_usd: 0
